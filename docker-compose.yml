version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bni
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bni
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bni"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: bni-mpm:local
    container_name: bni-mpm
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://bni:${POSTGRES_PASSWORD}@postgres:5432/bni
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NODE_ENV=production
      - DOMAIN_BASE=${DOMAIN_BASE:-bni.sisbios.cloud}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    ports:
      - "127.0.0.1:3005:3000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G

volumes:
  postgres-data:

name: CI — Lint, Type-check & Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bni
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: bni_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://bni:testpassword@localhost:5432/bni_test
        run: npx prisma generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://bni:testpassword@localhost:5432/bni_test
        run: npx prisma db push --skip-generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Build
        env:
          DATABASE_URL: postgresql://bni:testpassword@localhost:5432/bni_test
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum-xx
          DOMAIN_BASE: bni.sisbios.cloud
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

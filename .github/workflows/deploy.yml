name: CD — Deploy to VPS2 (Production)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (includes type-check)
        env:
          DATABASE_URL: postgresql://bni:testpassword@localhost:5432/bni_test
          NEXTAUTH_URL: https://bni.sisbios.cloud
          NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum-xx
          DOMAIN_BASE: bni.sisbios.cloud
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Deploy to VPS2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /root/bni-mpm
            git pull origin main

            echo "=== Starting postgres if not running ==="
            docker compose up -d postgres
            sleep 5

            echo "=== Building Docker image ==="
            docker build --network host -t bni-mpm:local .

            echo "=== Restarting app ==="
            docker compose up -d --force-recreate app

            echo "=== Running DB migrations ==="
            sleep 8
            docker exec bni-mpm npx prisma db push || true

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:3005 > /dev/null && echo "App is UP" || (echo "Health check FAILED" && exit 1)

            echo "=== Deploy complete ==="
